name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Load Node.js
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd /var/www/myapp
            
            # Pull latest code
            git pull origin main
            
            # ===== BACKEND (Node.js) =====
            cd /var/www/myapp/V0/multi-agent
            npm install
            pm2 delete backend 2>/dev/null || true
            pm2 start main.js --name backend
            
            # ===== FRONTEND (Next.js) =====
            cd /var/www/myapp/multi_agent_system/multi-agent-frontend/nextjs-chat-app
            npm install
            npm run build
            pm2 delete frontend 2>/dev/null || true
            pm2 start npm --name frontend -- start
        
            # Save PM2 processes
            pm2 save